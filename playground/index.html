<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Lisette Playground</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <div class="toolbar-left">
          <a href="https://lisette.run" target="_blank" rel="noopener" class="brand">
            <span class="brand-name">Lisette</span>
            <span class="brand-tag">Playground</span>
          </a>
        </div>
        <div class="toolbar-center">
          <button id="btn-run" class="btn btn-primary" title="Run (Ctrl+Enter)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M2 1.5v11l10-5.5L2 1.5z"/></svg>
            Run
          </button>
          <button id="btn-format" class="btn btn-secondary" title="Format (Alt+Shift+F)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h10M2 7h7M2 10h5"/></svg>
            Format
          </button>
          <button id="btn-check" class="btn btn-secondary" title="Type check">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7l3 3 7-6"/></svg>
            Check
          </button>
        </div>
        <div class="toolbar-right">
          <nav class="nav-links" aria-label="Project links">
            <a href="https://lisette.run" target="_blank" rel="noopener" class="nav-link">Lisette</a>
            <a href="https://github.com/ivov/lisette" target="_blank" rel="noopener" class="nav-link">

              Lisette
            </a>
            <a href="https://github.com/appleton/lisette-playground" target="_blank" rel="noopener" class="nav-link">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
              Playground
            </a>
          </nav>
          <button id="nav-menu-btn" aria-label="Open links menu" aria-expanded="false" aria-controls="nav-menu-popover">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
          </button>
          <div id="nav-menu-popover" role="menu" hidden>
            <a href="https://lisette.run" target="_blank" rel="noopener" role="menuitem" class="nav-menu-item">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M8 1.5L1.5 8h2V14h4v-4h1v4h4V8h2L8 1.5z"/></svg>
              lisette.run
            </a>
            <a href="https://github.com/ivov/lisette" target="_blank" rel="noopener" role="menuitem" class="nav-menu-item">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
              Lisette language
            </a>
            <a href="https://github.com/appleton/lisette-playground" target="_blank" rel="noopener" role="menuitem" class="nav-menu-item">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
              Playground repo
            </a>
          </div>
          <span id="status-indicator" class="status-idle">Ready</span>
        </div>
      </header>

      <main id="main-layout">
        <div id="editor-pane">
          <div id="editor-container"></div>
        </div>
        <div id="pane-resizer" role="separator" aria-orientation="vertical" title="Drag to resize"></div>
        <div id="output-pane">
          <div id="output-tabs">
            <button class="tab-btn active" data-tab="output">Output</button>
            <button class="tab-btn" data-tab="go-source">Go Source</button>
            <button class="tab-btn" data-tab="diagnostics">Diagnostics</button>
            <button id="drawer-toggle" aria-label="Toggle output panel">
              <svg id="drawer-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 9 7 5 11 9"/>
              </svg>
            </button>
          </div>
          <div id="output-content">
            <div class="tab-panel active" id="tab-output">
              <pre id="output-text" class="output-pre"><span class="output-hint">Press Run (Ctrl+Enter) to execute your Lisette code.</span></pre>
            </div>
            <div class="tab-panel" id="tab-go-source">
              <div id="go-source-editor-container"></div>
            </div>
            <div class="tab-panel" id="tab-diagnostics">
              <div id="diagnostics-list" class="diagnostics-container"></div>
            </div>
          </div>
        </div>
      </main>

      <div id="wasm-loading-overlay">
        <div class="loading-spinner"></div>
        <p>Loading Lisette compiler…</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
