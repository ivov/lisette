[advisories]
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is unmaintained but declared complete" },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[licenses.private]
ignore = true

[bans]
skip-tree = [
    { name = "windows-sys", depth = 5 },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
